# Site
name: "BangPypers"
description: "The Bangalore Python User Group"
meta_description: "BangPypers – The Bangalore Python User Group"
logo: '/assets/images/logo.jpg'
favicon: '/assets/images/logo.jpg'
og_img: '/assets/images/logo_og.jpg'
footer_img: '/assets/images/logo_footer.jpg'
post_default_img: '/assets/images/posts/bangpyperscover.jpg'
baseurl: ""
url: "https://bangalore.pythonindia.org"
google_analytics: 'G-2KWW473BLG'
# disqus: ''
# mailchimp-list: ''

# Plugins
plugins: 
  - jekyll-paginate
  - jekyll-archives
    
# Archives
jekyll-archives:
  enabled:
    - categories
    - years
    - months
    - days
  layout: archive
  permalinks:
    category: '/archives/:name/'
    year: '/blog/:year/'
    month: '/blog/:year/:month/'
    day: '/blog/:year/:month/:day/'
    # tag: '/authors/:name/'

collections:
  authors:
    output: true
    permalink: /authors/:path/

defaults:
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "archive"
      type: "authors"
  - scope:
      path: "_posts/community"
    values:
      layout: "post"
      permalink: /community-blog/:title/

# Pagination 
paginate: 6
paginate_path: /page:num/

# Other
markdown: kramdown
permalink: /blog/:year/:month/:day/:title/
highlighter: rouge

# Lazy Images ("enabled" or "disabled")
lazyimages: "enabled"

exclude: [vendor]